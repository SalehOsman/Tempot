name: Documentation Lint

on:
  pull_request:
    paths:
      - 'docs/product/**/*.md'
      - 'apps/docs/styles/**'
      - 'apps/docs/.vale.ini'

jobs:
  vale:
    name: Vale Prose Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Vale Linter
        uses: vale-cli/vale-action@v2
        with:
          files: docs/product/
          vale_flags: "--config=apps/docs/.vale.ini"
          token: ${{ secrets.GITHUB_TOKEN }}
