# Tempot — Local Development Infrastructure
# Provides: PostgreSQL (pgvector) + Redis
# Usage: pnpm docker:dev (starts) | pnpm docker:down (stops)
#
# Constitution Rule XVII — Graceful Shutdown:
# Services are configured with health checks to support ordered shutdown.
# Shutdown order: Hono → grammY → BullMQ → Redis → Prisma → Drizzle

# =============================================================================
# DEVELOPMENT SERVICES ONLY
# Current: PostgreSQL (pgvector) + Redis
#
# TODO — Phase 5: Add bot-server service after Dockerfile is created
# =============================================================================

services:
  bot-server:
    build:
      context: .
      dockerfile: ./apps/bot-server/Dockerfile
    container_name: tempot-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://tempot:tempot_password@postgres:5432/tempot_db
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BOT_MODE=polling
      - SUPER_ADMIN_IDS=7594239391
      # Uncomment for webhook mode (production). Requires a public URL.
      # - BOT_MODE=webhook
      # - WEBHOOK_URL=${WEBHOOK_URL:-https://example.com/webhook}
      # - WEBHOOK_SECRET=${WEBHOOK_SECRET:-local-dev-secret}
    ports:
      - '3000:3000'

  postgres:
    image: pgvector/pgvector:0.8.2-pg16
    container_name: tempot-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tempot
      POSTGRES_PASSWORD: tempot_password
      POSTGRES_DB: tempot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tempot -d tempot_db']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tempot-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
    name: tempot_postgres_data
  redis_data:
    name: tempot_redis_data
